<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-POP Fanchant Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="control-panel">
    <div class="logo">應援練習<span>HUB</span></div>
    <div class="interactions">
        <input type="text" id="groupSearch" placeholder="搜尋團體..." onkeyup="filterGroups()">
        <select id="groupSelector" onchange="switchGroup(this.value)">
            <option value="all">所有團體</option>
            <option value="twice">TWICE</option> 
            <option value="bts">BTS</option>
            <option value="aespa">aespa</option>
        </select>
    </div>
</nav>

<header class="main-header">
    <h1>K-POP FAN CHANT</h1>
    <p>點擊下方卡片開啟完整應援腳本</p>
</header>

<main class="content-grid" id="groupGrid">
    <div class="group-card" data-name="twice" onclick="location.href='TWICE/SET_ME_FREE.html'">
        <div class="card-header">TWICE</div>
        <div class="card-title">SET ME FREE</div>
        <div class="preview">點擊進入專屬應援頁面...</div>
    </div>

    <div class="group-card" data-name="bts" onclick="location.href='bts.html'">
        <div class="card-header">BTS</div>
        <div class="card-title">Dynamite</div>
        <div class="preview">點擊進入專屬應援頁面...</div>
    </div>

    <div class="group-card" data-name="aespa" onclick="location.href='aespa.html'">
        <div class="card-header">aespa</div>
        <div class="card-title">Supernova</div>
        <div class="preview">點擊進入專屬應援頁面...</div>
    </div>
</main>

<div id="modalOverlay" class="modal-overlay" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <div id="modalBody"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
